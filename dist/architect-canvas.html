<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Architect Canvas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--c-teal:hsl(178,42%,34%);
--c-blue:hsl(215,42%,44%);
--c-amber:hsl(35,52%,44%);
--c-red:hsl(8,48%,46%);
--c-teal-bg:hsl(178,42%,95%);
--c-amber-bg:hsl(35,52%,94%);
--c-red-bg:hsl(8,48%,95%);
--ink:#2b3036;
--ink-2:#5a626b;
--ink-3:#8a929b;
--line:#e3e6ea;
--bg:#f6f7f8;
--card:#fff;
}
body{font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;font-size:14px;line-height:1.7;color:var(--ink);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--c-teal);text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:13px}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
h2{border-left:4px solid var(--c-teal);padding-left:10px;font-size:15px;font-weight:600;color:var(--ink);margin-bottom:12px}

#app-header{background:var(--card);border-bottom:3px solid var(--c-teal);position:sticky;top:0;z-index:100}
#header-inner{max-width:1180px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
#header-brand{flex:1;min-width:200px}
#header-brand h1{font-size:18px;font-weight:700;color:var(--ink);line-height:1.2}
#header-brand p{font-size:12px;color:var(--ink-2);margin-top:2px}
#header-toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:4px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);white-space:nowrap;transition:background 0.15s,color 0.15s,border-color 0.15s}
.btn:hover{background:var(--bg);color:var(--ink);border-color:var(--ink-3)}
.btn-primary{background:var(--c-teal);color:#fff;border-color:var(--c-teal)}
.btn-primary:hover{background:hsl(178,42%,28%);border-color:hsl(178,42%,28%);color:#fff}
.btn-danger{color:var(--c-red);border-color:var(--c-red)}
.btn-danger:hover{background:var(--c-red-bg)}

#main-nav{background:var(--card);border-bottom:1px solid var(--line)}
#nav-inner{max-width:1180px;margin:0 auto;padding:0 20px;display:flex;gap:0}
.nav-tab{padding:10px 20px;border:none;background:none;font-size:14px;color:var(--ink-2);border-bottom:3px solid transparent;margin-bottom:-1px;transition:color 0.15s,border-color 0.15s}
.nav-tab:hover{color:var(--ink)}
.nav-tab.active{color:var(--c-teal);border-bottom-color:var(--c-teal);font-weight:600}

#main-content{flex:1;max-width:1180px;width:100%;margin:0 auto;padding:24px 20px}

.tab-panel{display:none}
.tab-panel.active{display:block}

#tab-diagram{display:none}
#tab-diagram.active{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}

#systems-editor{display:flex;flex-direction:column;gap:12px}
#systems-list{display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 260px);overflow-y:auto;padding-right:4px}

.system-card{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:14px}
.system-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.system-card-header input[type=text]{flex:1;border:1px solid var(--line);border-radius:4px;padding:4px 8px;background:var(--bg)}
.system-card-header input[type=text]:focus{outline:none;border-color:var(--c-teal)}
.btn-icon{width:26px;height:26px;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--ink-3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;padding:0}
.btn-icon:hover{background:var(--c-red-bg);color:var(--c-red);border-color:var(--c-red)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.field-row.full{grid-template-columns:1fr}
.field-label{font-size:12px;color:var(--ink-2);margin-bottom:2px}
.field-row select,.field-row input[type=text]{width:100%;border:1px solid var(--line);border-radius:4px;padding:4px 8px;background:var(--bg)}
.field-row select:focus,.field-row input[type=text]:focus{outline:none;border-color:var(--c-teal)}
.dep-select{width:100%;border:1px solid var(--line);border-radius:4px;padding:4px 8px;background:var(--bg);min-height:60px}
.dep-select:focus{outline:none;border-color:var(--c-teal)}

#canvas-area{display:flex;flex-direction:column;gap:12px}
#diagram-canvas{background:var(--card);border:1px solid var(--line);border-radius:6px;overflow:auto;min-height:400px;position:relative}
#diagram-canvas svg{display:block}
#diagram-legend{display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px;background:var(--card);border:1px solid var(--line);border-radius:6px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-2)}
.legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}

.status-active{background:var(--c-teal);color:#fff}
.status-transforming{background:var(--c-amber);color:#fff}
.status-stalled{background:var(--c-red);color:#fff}
.status-missing{background:var(--ink-3);color:#fff}
.legend-dot.status-active{background:hsl(178,42%,34%)}
.legend-dot.status-transforming{background:hsl(35,52%,44%)}
.legend-dot.status-stalled{background:hsl(8,48%,46%)}
.legend-dot.status-missing{background:hsl(0,0%,55%)}

#tab-positioning{display:none}
#tab-positioning.active{display:flex;flex-direction:column;gap:20px}

.form-section{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:12px;font-weight:500;color:var(--ink-2)}
.form-field input[type=text],.form-field select,.form-field textarea{border:1px solid var(--line);border-radius:4px;padding:6px 10px;background:var(--bg);color:var(--ink)}
.form-field input[type=text]:focus,.form-field select:focus,.form-field textarea:focus{outline:none;border-color:var(--c-teal)}
.form-field textarea{resize:vertical;min-height:72px}

#authorities-table-editor{display:flex;flex-direction:column;gap:8px}
#authorities-rows{display:flex;flex-direction:column;gap:6px}
.authority-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 30px;gap:6px;align-items:center}
.authority-row input{border:1px solid var(--line);border-radius:4px;padding:4px 8px;background:var(--bg);color:var(--ink);width:100%}
.authority-row input:focus{outline:none;border-color:var(--c-teal)}
.authority-row-header{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 30px;gap:6px}
.authority-row-header span{font-size:11px;color:var(--ink-3);font-weight:500}

#positioning-output{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:20px;display:none;flex-direction:column;gap:20px}
#positioning-output.visible{display:flex}
.output-section{display:flex;flex-direction:column;gap:8px}
.output-section h3{font-size:13px;font-weight:600;color:var(--ink);border-bottom:1px solid var(--line);padding-bottom:6px}
#narrative-block{position:relative}
#narrative-text{background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:12px;white-space:pre-wrap;line-height:1.8;color:var(--ink);font-size:13px;min-height:100px}
#copy-narrative{position:absolute;top:8px;right:8px}
.capability-table{width:100%;border-collapse:collapse;font-size:13px}
.capability-table th{background:var(--c-teal-bg);color:var(--c-teal);padding:6px 10px;text-align:left;border:1px solid var(--line);font-weight:600}
.capability-table td{padding:6px 10px;border:1px solid var(--line);vertical-align:top}
.capability-table tr:nth-child(even) td{background:var(--bg)}
.highlights-list{display:flex;flex-direction:column;gap:6px}
.highlight-item{padding:6px 10px;background:var(--c-teal-bg);border-left:3px solid var(--c-teal);border-radius:0 4px 4px 0;font-size:13px;color:var(--ink)}

#generate-btn-row{display:flex;justify-content:flex-start}

#license-footer{max-width:1180px;margin:0 auto;width:100%;padding:10px 20px;font-size:11px;color:var(--ink-3);border-top:1px solid var(--line);margin-top:auto}

#toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:8px 16px;border-radius:4px;font-size:13px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}

.empty-state{color:var(--ink-3);font-size:13px;text-align:center;padding:24px;background:var(--bg);border-radius:4px;border:1px dashed var(--line)}

@media(max-width:780px){
  #tab-diagram.active{grid-template-columns:1fr}
  #systems-list{max-height:none}
  .form-grid{grid-template-columns:1fr}
  .authority-row{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto}
}
</style>
</head>
<body>

<header id="app-header">
  <div id="header-inner">
    <div id="header-brand">
      <h1>Architect Canvas</h1>
      <p>架構師的系統地圖與定位提案工作台</p>
    </div>
    <div id="header-toolbar">
      <button class="btn" id="btn-load-sample">範例公司</button>
      <button class="btn btn-danger" id="btn-clear">清空成我的公司</button>
      <button class="btn" id="btn-import">匯入 JSON</button>
      <input type="file" id="import-file-input" accept=".json" style="display:none">
      <button class="btn" id="btn-export">匯出 JSON</button>
      <button class="btn" id="btn-export-png">匯出架構圖 PNG</button>
      <button class="btn" id="btn-export-svg">匯出架構圖 SVG</button>
    </div>
  </div>
</header>

<nav id="main-nav">
  <div id="nav-inner">
    <button class="nav-tab active" data-tab="diagram">系統架構圖</button>
    <button class="nav-tab" data-tab="positioning">軟體定位</button>
  </div>
</nav>

<main id="main-content">
  <div id="tab-diagram" class="tab-panel active">
    <div id="systems-editor">
      <h2>系統清單</h2>
      <button class="btn btn-primary" id="btn-add-system">+ 新增系統</button>
      <div id="systems-list"></div>
    </div>
    <div id="canvas-area">
      <h2>架構圖</h2>
      <div id="diagram-canvas"></div>
      <div id="diagram-legend">
        <div class="legend-item"><div class="legend-dot status-active"></div>現行 (Active)</div>
        <div class="legend-item"><div class="legend-dot status-transforming"></div>轉型中 (Transforming)</div>
        <div class="legend-item"><div class="legend-dot status-stalled"></div>停擺 (Stalled)</div>
        <div class="legend-item"><div class="legend-dot status-missing"></div>缺位 (Missing)</div>
      </div>
    </div>
  </div>

  <div id="tab-positioning" class="tab-panel">
    <div class="form-section">
      <h2>定位問卷</h2>
      <div class="form-grid">
        <div class="form-field">
          <label>組織名稱 (orgName)</label>
          <input type="text" id="pos-orgName" placeholder="例：聯合數位服務有限公司">
        </div>
        <div class="form-field">
          <label>主要目標 (primaryGoal)</label>
          <select id="pos-primaryGoal">
            <option value="">請選擇</option>
            <option value="整合">整合</option>
            <option value="現代化">現代化</option>
            <option value="資安強化">資安強化</option>
            <option value="規模化">規模化</option>
            <option value="降本">降本</option>
          </select>
        </div>
        <div class="form-field full">
          <label>核心價值 (coreValue)</label>
          <textarea id="pos-coreValue" placeholder="描述組織的核心業務價值與競爭優勢"></textarea>
        </div>
        <div class="form-field full">
          <label>重複開發風險 (duplicationRisks)</label>
          <textarea id="pos-duplicationRisks" placeholder="描述目前存在哪些重複建設或功能孤島的風險"></textarea>
        </div>
        <div class="form-field">
          <label>提案對象 (audience)</label>
          <select id="pos-audience">
            <option value="">請選擇</option>
            <option value="高階主管">高階主管</option>
            <option value="技術團隊">技術團隊</option>
            <option value="客戶">客戶</option>
          </select>
        </div>
      </div>
      <div style="margin-top:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <label style="font-size:12px;font-weight:500;color:var(--ink-2)">能力歸屬 (authorities)</label>
          <button class="btn" id="btn-add-authority">+ 新增列</button>
        </div>
        <div id="authorities-table-editor">
          <div class="authority-row-header">
            <span>共用能力</span>
            <span>權威來源</span>
            <span>應取用系統</span>
            <span>現況落差</span>
            <span></span>
          </div>
          <div id="authorities-rows"></div>
        </div>
      </div>
    </div>
    <div id="generate-btn-row">
      <button class="btn btn-primary" id="btn-generate" style="padding:8px 24px;font-size:14px">產生定位論述</button>
    </div>
    <div id="positioning-output">
      <div class="output-section">
        <h3>定位論述 (Narrative)</h3>
        <div id="narrative-block">
          <div id="narrative-text"></div>
          <button class="btn" id="copy-narrative" style="font-size:12px;padding:3px 8px">複製</button>
        </div>
      </div>
      <div class="output-section">
        <h3>能力地圖表格 (Capability Table)</h3>
        <div id="capability-table-container"></div>
      </div>
      <div class="output-section">
        <h3>重點摘要 (Highlights)</h3>
        <div id="highlights-container"></div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div id="license-footer">Licensed to test@buyer.example — single seat</div>
</footer>

<div id="toast"></div>
